<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Dashboard</title>
</head>
<body>
    <header>
        <h1>Taxi Fleet Dashboard</h1>
    </header>
    <section id="key-metrics">
        <h2>Key Metrics</h2>
        <div id="metrics-container"></div>
    </section>
    <section id="weekly-trends">
        <h2>Weekly Revenue Trends</h2>
        <div id="trends-chart"></div>
    </section>
    <section id="heatmap">
        <h2>Demand Heatmap</h2>
        <iframe id="heatmap-iframe" width="100%" height="500px"></iframe>
    </section>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script>
        async function fetchMetrics() {
            const response = await fetch('/api/key-metrics');
            const metrics = await response.json();
            const container = document.getElementById('metrics-container');
            container.innerHTML = `
                <p>Total Rides: ${metrics.total_rides}</p>
                <p>Average Price: ${metrics.average_price.toFixed(2)}</p>
                <p>High-Demand Zones:</p>
                <ul>
                    ${metrics.high_demand_zones.map(zone => `<li>${zone.latitude}, ${zone.longitude} (Count: ${zone.count})</li>`).join('')}
                </ul>
            `;
        }

        async function fetchWeeklyTrends() {
            const response = await fetch('/api/weekly-trends');
            const chartData = await response.json();
            Plotly.newPlot('trends-chart', chartData.data, chartData.layout);
        }

        async function fetchHeatmap() {
            const response = await fetch('/api/heatmap-data');
            const heatmapHtml = await response.text();
            document.getElementById('heatmap-iframe').srcdoc = heatmapHtml;
        }

        fetchMetrics();
        fetchWeeklyTrends();
        fetchHeatmap();
    </script>
</body>
</html>
