<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ride Fleet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="dashboard-header">
        <h1>Welcome to the Ride Fleet Dashboard!</h1>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
    </header>
    <div class="metrics-container">
        <div class="metric-card">
            <h2>Total Rides</h2>
            <p>{{ key_metrics['total_rides'] }}</p>
        </div>
        <div class="metric-card">
            <h2>Total Revenue (€)</h2>
            <p>{{ key_metrics['total_revenue'] }}</p>
        </div>
        <div class="metric-card">
            <h2>Average Price (€)</h2>
            <p>{{ key_metrics['average_price'] }}</p>
        </div>
        <div class="metric-card">
            <h2>Median Price (€)</h2>
            <p>{{ key_metrics['median_price'] }}</p>
        </div>
    </div>
    <div class="dashboard-buttons">
        <a href="{{ url_for('daily_revenue') }}" class="btn btn-primary">Daily Revenue</a>
        <a href="{{ url_for('hourly_distribution') }}" class="btn btn-primary">Hourly Distribution</a>
        <a href="{{ url_for('heatmap') }}" class="btn btn-primary">Heatmap</a>
    </div>
</body>
</html>
